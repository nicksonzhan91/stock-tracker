name: 06:00 美股資料收集

on:
  schedule:
    - cron: "0 22 * * 1-5"   # UTC 22:00 = 台灣 06:00（週一至週五）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests yfinance beautifulsoup4 urllib3

      - name: 執行 fetch_us.py
        run: python scripts/fetch_us.py

      - name: 寫回 latest.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: 更新美股資料 [skip ci]"
          file_pattern: data/latest.json
