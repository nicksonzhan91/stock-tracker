name: 08:00 亞股資料 + Telegram 推送

on:
  workflow_dispatch:    # 由 cron-job.org 在台灣時間 08:10 精確觸發（UTC 00:10，週一至週五）
                        # 已移除 GitHub 原生 schedule，避免延遲補跑造成重複推送

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONUTF8: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests yfinance beautifulsoup4 urllib3

      - name: 執行 fetch_asia.py
        run: python scripts/fetch_asia.py

      - name: 寫回 latest.json
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: 更新亞股資料 [skip ci]"
          file_pattern: data/latest.json

      - name: 發送 Telegram 通知
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/notify_line.py
