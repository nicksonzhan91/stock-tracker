name: 18:00 台股法人 + 均線指標

on:
  schedule:
    - cron: "0 10 * * 1-6"   # UTC 10:00 = 台灣 18:00（週一至週六）
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONUTF8: "1"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests yfinance beautifulsoup4 urllib3 openpyxl

      - name: 執行 fetch_institutional.py
        run: python scripts/fetch_institutional.py

      - name: 執行 calc_indicators.py
        run: python scripts/calc_indicators.py

      - name: 執行 export_value_excel.py
        run: python scripts/export_value_excel.py

      - name: 寫回 latest.json、歷史資料及低估區
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "data: 更新台股法人與指標 [skip ci]"
          file_pattern: data/latest.json data/history/ data/value_zone.json data/value_zone_prev.json
